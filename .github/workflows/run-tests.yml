name: Run Playwright Tests

on:
  workflow_dispatch:
    inputs:
      env:
        description: Environment
        required: true
        default: staging
        type: choice
        options:
          - dev
          - staging
          - uat
      platform:
        description: Platform
        required: true
        default: b2b
        type: choice
        options:
          - b2b
          - greenpan
      suite:
        description: Test suite
        required: true
        default: e2e
        type: choice
        options:
          - smoke
          - regression
          - e2e

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ENV: ${{ inputs.env }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run test:install-browsers
      - run: npm run test:ci -- --platform=${{ inputs.platform }} --suite=${{ inputs.suite }}
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ inputs.platform }}-${{ inputs.suite }}-${{ inputs.env }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - uses: actions/configure-pages@v5
        if: always()

      - uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: playwright-report

  deploy:
    needs: test
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Playwright report summary
        if: always()
        run: |
          {
            echo "## Playwright Report"
            echo ""
            if [ -n "${{ steps.deployment.outputs.page_url }}" ]; then
              echo "Report published to GitHub Pages: [${{ steps.deployment.outputs.page_url }}](${{ steps.deployment.outputs.page_url }})"
            else
              echo "GitHub Pages deployment did not produce a URL. Check the deploy step logs."
            fi
            echo ""
            echo "| Input | Value |"
            echo "| --- | --- |"
            echo "| Environment | \`${{ inputs.env }}\` |"
            echo "| Platform | \`${{ inputs.platform }}\` |"
            echo "| Suite | \`${{ inputs.suite }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
